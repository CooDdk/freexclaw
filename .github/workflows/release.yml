name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_name: freexclaw-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset_name: freexclaw-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: freexclaw-darwin-arm64
          - goos: linux
            goarch: amd64
            asset_name: freexclaw-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: freexclaw-linux-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release asset
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath -o "dist/${ASSET_NAME}" ./cmd

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-assets

    steps:
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --title "freexclaw $TAG_NAME" \
              --notes "Automated release for $TAG_NAME."
          fi
